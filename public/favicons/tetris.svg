<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="32" height="32" rx="6" fill="#050508"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#1f1f35" stroke-width="1.5"/>
  <!-- T piece (purple) -->
  <g fill="#b14dff">
