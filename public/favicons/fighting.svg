<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="32" height="32" rx="6" fill="#050508"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#1f1f35" stroke-width="1.5"/>
  <!-- boxing glove (blocky) -->
  <g fill="#ff3d00">
    <rect x="8"  y="12" width="12" height="12"/>
    <rect x="6"  y="15" width="2"  height="6"/>
    <rect x="8"  y="9"  width="10" height="3"/>
    <!-- thumb -->
    <rect x="20" y="16" width="3"  height="5"/>
  </g>
  <!-- wrist cuff -->
  <rect x="8" y="24" width="12" height="3" fill="#ffb199"/>
  <!-- impact spark -->
  <g fill="#ffeb3b">
    <rect x="24" y="11" width="2" height="2"/>
    <rect x="27" y="9"  width="2" height="2"/>
    <rect x="26" y="14" width="2" height="2"/>
  </g>
</svg>
