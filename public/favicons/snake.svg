<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <rect width="32" height="32" rx="6" fill="#050508"/>
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#1f1f35" stroke-width="1.5"/>
  <!-- snake body segments (4px grid) -->
  <g fill="#4dff6a">
    <rect x="6"  y="20" width="4" height="4"/>
    <rect x="10" y="20" width="4" height="4"/>
    <rect x="14" y="20" width="4" height="4"/>
    <rect x="14" y="16" width="4" height="4"/>
    <rect x="14" y="12" width="4" height="4"/>
    <rect x="18" y="12" width="4" height="4"/>
    <!-- head -->
    <rect x="22" y="12" width="4" height="4"/>
  </g>
  <!-- eye on head -->
  <rect x="24" y="13" width="1.5" height="1.5" fill="#050508"/>
  <!-- apple -->
  <circle cx="9" cy="10" r="3" fill="#ff3d00"/>
  <rect x="8.5" y="6" width="1.2" height="2" fill="#39ff14"/>
</svg>
